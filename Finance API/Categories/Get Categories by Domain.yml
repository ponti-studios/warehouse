info:
  name: Get Categories by Domain
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/v1/categories?domain=finance"
  params:
    - name: domain
      value: finance
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
