info:
  name: Create Category
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/api/v1/categories"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "name": "Groceries",
          "domain": "finance",
          "description": "Food and household items"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
